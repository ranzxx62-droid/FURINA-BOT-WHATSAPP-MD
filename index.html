<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FURINA MD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#eaf4ff;
overflow:hidden;
}

/* PROTOCOL */
#protocol{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#eaf4ff;
z-index:10;
}

.box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

button{
padding:10px 20px;
border:none;
background:#6bbcff;
color:white;
cursor:pointer;
margin-top:15px;
}

/* INTRO VIDEO */
#intro{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
align-items:flex-end;
justify-content:center;
z-index:9;
}

#intro video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.intro-text{
position:relative;
color:white;
font-family:Orbitron;
margin-bottom:40px;
font-size:18px;
letter-spacing:2px;
text-shadow:0 0 10px rgba(0,0,0,0.7);
}

/* MAIN */
#main{
display:none;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<!-- STEP 1: PERSETUJUAN -->
<div id="protocol">
<div class="box">
<h2>FURINA MD</h2>
<p>Silakan setujui untuk masuk</p>
<button onclick="lanjut()">MASUK</button>
</div>
</div>

<!-- STEP 2: VIDEO INTRO -->
<div id="intro">
<video autoplay muted loop playsinline>
<source src="VID-20260320-WA0145.mp4" type="video/mp4">
</video>
<div class="intro-text">Membuka sistem...</div>
</div>

<!-- STEP 3: MAIN -->
<div id="main">
<h1>BOT FURINA MD</h1>
<p>Selamat datang di sistem</p>
</div>

<script>

function lanjut(){
document.getElementById("protocol").style.display="none";
document.getElementById("intro").style.display="flex";

/* setelah 5 detik masuk ke main */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";
},5000);

}

</script>

</body>
</html>
