<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FURINA MD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#eaf4ff;
overflow:hidden;
}

/* INTRO VIDEO FULL */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:flex-end;
justify-content:center;
z-index:999;
}

#intro video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT BAWAH */
.intro-text{
position:relative;
z-index:2;
color:white;
font-family:Orbitron;
margin-bottom:40px;
font-size:18px;
letter-spacing:2px;
text-shadow:0 0 10px rgba(0,0,0,0.7);
}

/* PROTOCOL */
#protocol{
display:none;
position:fixed;
width:100%;
height:100%;
background:#eaf4ff;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

button{
padding:10px 20px;
border:none;
background:#6bbcff;
color:white;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video id="vid" autoplay muted loop playsinline>
<source src="./VID-20260320-WA0145.mp4" type="video/mp4">
</video>

<div class="intro-text">Membuka sistem...</div>
</div>

<!-- PROTOCOL -->
<div id="protocol">
<div class="box">
<h2>FURINA MD</h2>
<button onclick="masuk()">Masuk</button>
</div>
</div>

<script>

/* FORCE PLAY VIDEO */
const vid = document.getElementById("vid");

vid.play().catch(()=>{
console.log("autoplay diblok, biasa browser sok suci");
});

/* PINDAH HALAMAN */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("protocol").style.display="flex";
},5000);

function masuk(){
alert("Masuk ke sistem...");
}

</script>

</body>
</html>
